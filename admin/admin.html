<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin:0;
}

/* LOGIN */
#loginOverlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#020617;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:20px;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: 20px auto;
    padding: 15px;
}

/* INPUTS */
input, textarea, select {
    width:100%;
    margin:10px 0;
    padding:14px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

/* BUTTONS */
button {
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    width:100%;
    font-size:16px;
}

/* CARD */
.card {
    border:1px solid #334155;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    background:#020617;
}

/* SLIDER */
.slider {
    position:relative;
    width:100%;
    height:220px;
    margin-bottom:10px;
    overflow:hidden;
    border-radius:10px;
}

.slider img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.slider img.active {
    display:block;
}

.slider button {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.6);
    width:auto;
    padding:8px 12px;
}

.slider .prev { left:5px; }
.slider .next { right:5px; }

/* MOBILE */
@media (max-width: 600px) {
    h1 { font-size:22px; }
    h2 { font-size:18px; }

    .slider {
        height:180px;
    }
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
    <h2>Admin Login</h2>
    <input type="password" id="passwordInput" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- ADMIN -->
<div class="container" id="adminPanel" style="display:none;">

    <!-- UPLOAD -->
    <div class="card">
        <h1>Upload</h1>

        <select id="category">
            <option value="trikots">Trikots</option>
            <option value="spiele">Spiele</option>
            <option value="garageAktuell">Garage Aktuell</option>
            <option value="garageAlt">Garage Alt</option>
        </select>

        <input type="text" id="title" placeholder="Titel">
        <textarea id="comment" placeholder="Kommentar"></textarea>

        <input type="file" id="file" multiple>

        <button onclick="upload()">Hochladen</button>

        <p id="status"></p>
    </div>

    <hr>

    <!-- VERWALTUNG -->
    <div class="card">
        <h2>Inhalte verwalten</h2>

        <select id="viewCategory" onchange="loadEntries()">
            <option value="trikots">Trikots</option>
            <option value="spiele">Spiele</option>
            <option value="garageAktuell">Garage Aktuell</option>
            <option value="garageAlt">Garage Alt</option>
        </select>
    </div>

    <div id="entries"></div>

</div>

<script>

let PASSWORD = "";

/* LOGIN */
async function login(){

    const pw = document.getElementById("passwordInput").value;

    const res = await fetch("/api/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ password: pw })
    });

    if(res.status === 200){
        PASSWORD = pw;

        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";

        loadEntries();
    } else {
        document.getElementById("error").innerText = "Falsches Passwort";
    }
}

/* UPLOAD */
async function upload(){

    const files = document.getElementById("file").files;
    const title = document.getElementById("title").value;
    const comment = document.getElementById("comment").value;
    const category = document.getElementById("category").value;

    if(files.length === 0 || !title){
        alert("Titel + Bild erforderlich");
        return;
    }

    let images = [];

    for(let file of files){

        if(images.length >= 10) break;

        // 🔥 Bild komprimieren
        const compressed = await compressImage(file);

        const formData = new FormData();
        formData.append("file", compressed);
        formData.append("password", PASSWORD);

        const uploadRes = await fetch("/api/upload-image", {
            method: "POST",
            body: formData
        });

        const data = await uploadRes.json();

        if(data.url){
            images.push(data.url); // ✅ nur URL speichern
        } else {
            alert("Fehler beim Bild-Upload:\n" + (data.error || data.message));
            return;
        }
    }

    // 🔥 JSON speichern
    const res = await fetch("/api/upload", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            images,
            category,
            title,
            comment,
            password: PASSWORD
        })
    });

    const result = await res.json();
    alert(result.message);

    loadEntries();
    
}

async function compressImage(file){
    return new Promise(resolve => {

        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => {
            img.src = e.target.result;
        };

        img.onload = () => {
            const canvas = document.createElement("canvas");

            const maxWidth = 1200;
            const scale = maxWidth / img.width;

            canvas.width = maxWidth;
            canvas.height = img.height * scale;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                resolve(new File([blob], file.name, {
                    type: "image/jpeg"
                }));
            }, "image/jpeg", 0.7);
        };

        reader.readAsDataURL(file);
    });
}
    
/* SLIDER */
function initSlider(container){
    let index = 0;
    const slides = container.querySelectorAll("img");

    function show(i){
        slides.forEach(s => s.classList.remove("active"));
        slides[i].classList.add("active");
    }

    container.querySelector(".next").onclick = () => {
        index = (index + 1) % slides.length;
        show(index);
    };

    container.querySelector(".prev").onclick = () => {
        index = (index - 1 + slides.length) % slides.length;
        show(index);
    };
}

/* LOAD */
async function loadEntries(){

    const type = document.getElementById("viewCategory").value;

    const res = await fetch(`/content/${type}.json`);
    const data = await res.json();

    const container = document.getElementById("entries");

    container.innerHTML = data.map((item, i) => `
        <div class="card">

            <div class="slider" id="slider-${i}">
                ${item.images.map((img, j)=>`
                  <img src="https://raw.githubusercontent.com/BelliTim/Public/main${img}" class="${j===0?'active':''}">
                `).join("")}

                <button class="prev">❮</button>
                <button class="next">❯</button>
            </div>

            <input value="${item.title}" id="title-${i}">
            <textarea id="comment-${i}">${item.comment}</textarea>

            <input type="file" id="file-${i}" multiple>

            <button onclick="saveEdit('${type}', ${i})">💾 Speichern</button>
            <button onclick="deleteEntry('${type}', ${i})">❌ Löschen</button>
        </div>
    `).join("");

    setTimeout(()=>{
        document.querySelectorAll(".slider").forEach(initSlider);
    },100);
}

/* EDIT */
async function saveEdit(type, index){

    const title = document.getElementById(`title-${index}`).value;
    const comment = document.getElementById(`comment-${index}`).value;
    const files = document.getElementById(`file-${index}`).files;

    let images = [];

    if(files.length > 0){
        for(let file of files){
            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
            images.push(base64);
        }
    }

    const res = await fetch("/api/edit", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            type,
            index,
            title,
            comment,
            images,
            password: PASSWORD
        })
    });

    const data = await res.json();
    alert(data.message);

    loadEntries();
}

/* DELETE */
async function deleteEntry(type, index){

    if(!confirm("Löschen?")) return;

    const res = await fetch("/api/delete", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            type,
            index,
            password: PASSWORD
        })
    });

    const data = await res.json();
    alert(data.message);

    loadEntries();
}

document.getElementById("viewCategory").addEventListener("change", loadEntries);

loadEntries();

</script>

</body>
</html>
