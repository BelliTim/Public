<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    margin-top: 80px;
}

input, textarea, select {
    width: 80%;
    max-width: 400px;
    margin: 10px;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>

</head>
<body>

<div class="container">
    <h1>Admin Upload</h1>

    <!-- Kategorie -->
    <select id="category">
        <option value="trikots">Trikots</option>
        <option value="spiele">Spiele</option>
    </select>

    <!-- Titel -->
    <input type="text" id="title" placeholder="Titel">

    <!-- Kommentar -->
    <textarea id="comment" placeholder="Kommentar"></textarea>

    <!-- Bild -->
    <input type="file" id="file">

    <br>
    <button onclick="upload()">Hochladen</button>

    <p id="status"></p>
</div>

<script>
async function upload() {
    const file = document.getElementById("file").files[0];
    const title = document.getElementById("title").value;
    const comment = document.getElementById("comment").value;
    const category = document.getElementById("category").value;

    if (!file || !title) {
        alert("Titel und Bild erforderlich!");
        return;
    }

    const reader = new FileReader();
    reader.readAsDataURL(file);

    reader.onload = async () => {
        const res = await fetch("/api/upload", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                file: reader.result,
                fileName: file.name,
                category: category,
                title: title,
                comment: comment
            })
        });

        const data = await res.json();
        document.getElementById("status").innerText = data.message;
    };
}
</script>

</body>
</html>
