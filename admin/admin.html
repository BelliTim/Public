<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
}

/* LOGIN */
#loginOverlay {
    position: fixed;
    inset: 0;
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
    z-index: 999;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: 20px auto;
    padding: 15px;
}

/* INPUTS */
input,
textarea,
select {
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    box-sizing: border-box;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

/* BUTTONS */
button,
.file-label {
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
    box-sizing: border-box;
    text-align: center;
    display: inline-block;
}

/* CARD */
.card {
    border: 1px solid #334155;
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
    background: #020617;
}

/* FILE PICKER */
.file-input {
    display: none;
}

.file-picker-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 10px 0;
}

.file-name {
    color: #cbd5e1;
    font-size: 14px;
    word-break: break-word;
}

/* STATUS */
.status-text {
    margin-top: 8px;
    color: #cbd5e1;
    font-size: 14px;
}

/* SLIDER */
.slider {
    position: relative;
    width: 100%;
    height: 220px;
    margin-bottom: 10px;
    overflow: hidden;
    border-radius: 10px;
    background: #0b1220;
}

.slider img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.slider img.active {
    display: block;
}

.slider button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    width: auto;
    padding: 8px 12px;
    margin: 0;
}

.slider .prev { left: 5px; }
.slider .next { right: 5px; }

/* MOBILE */
@media (max-width: 600px) {
    h1 { font-size: 22px; }
    h2 { font-size: 18px; }

    .slider {
        height: 180px;
    }

    .container {
        padding: 12px;
    }

    .card {
        padding: 14px;
    }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
    <h2>Admin Login</h2>
    <input type="password" id="passwordInput" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- ADMIN -->
<div class="container" id="adminPanel" style="display:none;">

    <!-- UPLOAD -->
    <div class="card">
        <h1>Upload</h1>

        <select id="category">
            <option value="trikots">Trikots</option>
            <option value="spiele">Spiele</option>
            <option value="garageAktuell">Garage Aktuell</option>
            <option value="garageAlt">Garage Alt</option>
        </select>

        <input type="text" id="title" placeholder="Titel">
        <textarea id="comment" placeholder="Kommentar"></textarea>

        <div class="file-picker-row">
            <label for="file" class="file-label">Bilder auswählen</label>
            <input type="file" id="file" class="file-input" multiple accept="image/*">
            <div class="file-name" id="fileName">Keine Dateien ausgewählt</div>
        </div>

        <button onclick="upload()">Hochladen</button>

        <p id="status" class="status-text"></p>
    </div>

    <hr>

    <!-- VERWALTUNG -->
    <div class="card">
        <h2>Inhalte verwalten</h2>

        <select id="viewCategory">
            <option value="trikots">Trikots</option>
            <option value="spiele">Spiele</option>
            <option value="garageAktuell">Garage Aktuell</option>
            <option value="garageAlt">Garage Alt</option>
        </select>
    </div>

    <div id="entries"></div>
</div>

<script>
let PASSWORD = "";

/* HELPERS */
function getImageList(item) {
    if (Array.isArray(item.images)) return item.images;
    if (item.image) return [item.image];
    return [];
}

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function updateFileLabel(inputId, labelId) {
    const input = document.getElementById(inputId);
    const label = document.getElementById(labelId);

    if (!input || !label) return;

    const count = input.files.length;
    if (count === 0) {
        label.textContent = "Keine Dateien ausgewählt";
    } else if (count === 1) {
        label.textContent = input.files[0].name;
    } else {
        label.textContent = count + " Dateien ausgewählt";
    }
}

/* LOGIN */
async function login() {
    const pw = document.getElementById("passwordInput").value;

    try {
        const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw })
        });

        if (res.status === 200) {
            PASSWORD = pw;
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("error").innerText = "";
            loadEntries();
        } else {
            document.getElementById("error").innerText = "Falsches Passwort";
        }
    } catch (e) {
        alert("Fehler beim Login: " + e);
    }
}

/* UPLOAD */
async function upload() {
    const files = document.getElementById("file").files;
    const title = document.getElementById("title").value.trim();
    const comment = document.getElementById("comment").value.trim();
    const category = document.getElementById("category").value;
    const status = document.getElementById("status");

    if (files.length === 0 || !title) {
        alert("Titel + mindestens 1 Bild erforderlich");
        return;
    }

    status.textContent = "Bilder werden verarbeitet...";

    let images = [];

    for (let file of files) {
        if (images.length >= 10) break;

        const compressed = await compressImage(file);

        const base64 = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.readAsDataURL(compressed);
        });

        images.push(base64);
    }

    try {
        status.textContent = "Upload läuft...";

        const res = await fetch("/api/upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                images,
                category,
                title,
                comment,
                password: PASSWORD
            })
        });

        const data = await res.json();
        alert(data.message);

        if (res.ok) {
            document.getElementById("title").value = "";
            document.getElementById("comment").value = "";
            document.getElementById("file").value = "";
            updateFileLabel("file", "fileName");
            status.textContent = "Upload erfolgreich";
            loadEntries();
        } else {
            status.textContent = "Upload fehlgeschlagen";
        }
    } catch (e) {
        status.textContent = "Upload fehlgeschlagen";
        alert("Fehler beim Upload: " + e);
    }
}

/* IMAGE COMPRESS */
async function compressImage(file) {
    return new Promise(resolve => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => {
            img.src = e.target.result;
        };

        img.onload = () => {
            const canvas = document.createElement("canvas");
            const maxWidth = 1200;
            const scale = Math.min(1, maxWidth / img.width);

            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                resolve(new File(
                    [blob],
                    file.name.replace(/\.[^.]+$/, "") + ".jpg",
                    { type: "image/jpeg" }
                ));
            }, "image/jpeg", 0.7);
        };

        reader.readAsDataURL(file);
    });
}

/* SLIDER */
function initSlider(container) {
    let index = 0;
    const slides = container.querySelectorAll("img");

    if (!slides.length) return;

    function show(i) {
        slides.forEach(s => s.classList.remove("active"));
        slides[i].classList.add("active");
    }

    const nextBtn = container.querySelector(".next");
    const prevBtn = container.querySelector(".prev");

    if (slides.length <= 1) {
        if (nextBtn) nextBtn.style.display = "none";
        if (prevBtn) prevBtn.style.display = "none";
        return;
    }

    nextBtn.onclick = () => {
        index = (index + 1) % slides.length;
        show(index);
    };

    prevBtn.onclick = () => {
        index = (index - 1 + slides.length) % slides.length;
        show(index);
    };
}

/* LOAD */
async function loadEntries() {
    const type = document.getElementById("viewCategory").value;

    try {
        const res = await fetch(`/content/${type}.json`);
        const data = await res.json();

        const container = document.getElementById("entries");

        container.innerHTML = data.map((item, i) => {
            const imageList = getImageList(item);
            const safeTitle = escapeHtml(item.title || "");
            const safeComment = escapeHtml(item.comment || item.description || "");

            return `
                <div class="card">
                    <div class="slider" id="slider-${i}">
                        ${imageList.map((img, j) => `
                            <img src="${img}" class="${j === 0 ? "active" : ""}" alt="${safeTitle}">
                        `).join("")}

                        <button class="prev" type="button">❮</button>
                        <button class="next" type="button">❯</button>
                    </div>

                    <input value="${safeTitle}" id="title-${i}">
                    <textarea id="comment-${i}">${safeComment}</textarea>

                    <div class="file-picker-row">
                        <label for="file-${i}" class="file-label">Neue Bilder auswählen</label>
                        <input type="file" id="file-${i}" class="file-input" multiple accept="image/*">
                        <div class="file-name" id="fileName-${i}">Keine Dateien ausgewählt</div>
                    </div>

                    <button onclick="saveEdit('${type}', '${item.id || ""}', ${i})">💾 Speichern</button>
<button onclick="deleteEntry('${type}', '${item.id || ""}', ${i})">❌ Löschen</button></div>
            `;
        }).join("");

        setTimeout(() => {
            document.querySelectorAll(".slider").forEach(initSlider);

            data.forEach((_, i) => {
                const input = document.getElementById(`file-${i}`);
                if (input) {
                    input.addEventListener("change", () => {
                        updateFileLabel(`file-${i}`, `fileName-${i}`);
                    });
                }
            });
        }, 50);

    } catch (e) {
        alert("Fehler beim Laden: " + e);
    }
}

/* EDIT */
async function saveEdit(type, id, index) {
    const title = document.getElementById(`title-${index}`).value.trim();
    const comment = document.getElementById(`comment-${index}`).value.trim();
    const files = document.getElementById(`file-${index}`).files;

    let images = [];

    if (files.length > 0) {
        for (let file of files) {
            if (images.length >= 10) break;

            const compressed = await compressImage(file);

            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(compressed);
            });

            images.push(base64);
        }
    }

    try {
        const res = await fetch("/api/edit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                type,
                id,
                index,
                title,
                comment,
                images,
                password: PASSWORD
            })
        });

        const data = await res.json();
        alert(data.message);
        loadEntries();
    } catch (e) {
        alert("Fehler beim Speichern: " + e);
    }
}

/* DELETE */
async function deleteEntry(type, id, index) {
    if (!confirm("Löschen?")) return;

    try {
        const res = await fetch("/api/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                type,
                id,
                index,
                password: PASSWORD
            })
        });

        const data = await res.json();
        alert(data.message);
        loadEntries();
    } catch (e) {
        alert("Fehler beim Löschen: " + e);
    }
}

/* EVENTS */
document.getElementById("viewCategory").addEventListener("change", loadEntries);
document.getElementById("file").addEventListener("change", () => {
    updateFileLabel("file", "fileName");
});
</script>

</body>
</html>
