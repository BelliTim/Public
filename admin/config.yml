backend:
  name: github
  repo: BelliTim/Public
  branch: main
  base_url: https://api.netlify.com

media_folder: "images"
public_folder: "/images"

collections:

  - name: "garage"
    label: "Garage"
    folder: "content/garage"
    
    create: true

    fields:
      - { label: "Auto", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Bild", name: "image", widget: "image" }

  - name: "trikots"
    label: "Trikots"
    folder: "trikots"
    create: true

    fields:
      - { label: "Team", name: "team", widget: "string" }
      - { label: "Spieler", name: "player", widget: "string" }
      - { label: "Saison", name: "season", widget: "string" }
      - { label: "Bild", name: "image", widget: "image" }
