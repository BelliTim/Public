<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#0f172a;
    color:white;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#020617;
    position:sticky;
    top:0;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:500;
    margin:0 20px;
    transition:0.3s;
}

nav a:hover{
    color:#38bdf8;
}

/* HERO */

.hero{
    height:90vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:60px;
    margin-bottom:10px;
}

.hero p{
    font-size:20px;
    opacity:0.7;
}

/* SECTIONS */

.section{
    padding:100px 20%;
}

.section h2{
    font-size:40px;
    margin-bottom:20px;
}

.card{
    background:#020617;
    padding:30px;
    border-radius:12px;
    margin-top:20px;
}

/* Smooth scroll */

html{
scroll-behavior:smooth;
}

</style>
</head>

<body>

<nav>

<div>
<a href="#lebenslauf">Lebenslauf</a>
</div>

<div>
<a href="#home">Home</a>
</div>

<div>
<a href="#garage">Garage</a>
</div>

</nav>

<section class="hero" id="home">

<h1>Willkommen</h1>
<p>Meine persönliche Website</p>

</section>


<section class="section" id="lebenslauf">

<h2>Lebenslauf</h2>

<div class="card">
<p>Hier kannst du später deinen Lebenslauf eintragen.</p>
</div>

</section>


<section class="section" id="garage">

<h2>Garage</h2>

<div class="card">
<p>Hier kannst du deine Fahrzeuge zeigen.</p>
<p>Zum Beispiel dein Opel Astra H TwinTop.</p>
</div>

</section>

</body>
</html>
