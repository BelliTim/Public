<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Passwort Overlay */

#passwordOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

#passwordBox{
background:#0f172a;
padding:40px;
border-radius:12px;
text-align:center;
}

#passwordBox input{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

#passwordBox button{
margin-top:10px;
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
}

.garage-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.garage-column{
background:#020617;
padding:20px;
border-radius:12px;
}

.garage-entry{
margin-top:20px;
padding:20px;
background:#0f172a;
border-radius:10px;
}

.garage-entry img{
width:100%;
margin-top:10px;
border-radius:8px;
}

.upload-box{
margin-top:60px;
background:#020617;
padding:30px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:15px;
}

input, textarea, select, button{
padding:10px;
border-radius:8px;
border:none;
font-family:'Poppins';
}

button{
background:#38bdf8;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#0f172a;
    color:white;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#020617;
    position:sticky;
    top:0;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:500;
    margin:0 20px;
    transition:0.3s;
}

nav a:hover{
    color:#38bdf8;
}

/* HERO */

.hero{
    height:90vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:60px;
    margin-bottom:10px;
}

.hero p{
    font-size:20px;
    opacity:0.7;
}

/* SECTIONS */

.section{
    padding:100px 20%;
}

.section h2{
    font-size:40px;
    margin-bottom:20px;
}

.card{
    background:#020617;
    padding:30px;
    border-radius:12px;
    margin-top:20px;
}

/* Smooth scroll */

html{
scroll-behavior:smooth;
}

</style>
</head>

<body>

<div id="passwordOverlay">

<div id="passwordBox">

<h2>Geschützter Bereich</h2>
<p>Bitte Passwort eingeben</p>

<input type="password" id="passwordInput" placeholder="Passwort">

<br>

<button onclick="checkPassword()">Login</button>

<p id="error" style="color:red;"></p>

</div>

</div>

<nav>

<div>
<a href="#lebenslauf">Lebenslauf</a>
</div>

<div>
<a href="#home">Home</a>
</div>

<div>
<a href="#garage">Garage</a>
</div>

</nav>

<section class="hero" id="home">

<h1>Willkommen</h1>
<p>Meine persönliche Website</p>

</section>


<section class="section" id="lebenslauf">

<h2>Lebenslauf</h2>

<div class="card">
<p>Hier kannst du später deinen Lebenslauf eintragen.</p>
</div>

</section>




<section class="section" id="garage">

<h2>Garage</h2>

<div class="garage-container">

<div class="garage-column">

<h3>Aktuell</h3>

<div id="garageAktuell"></div>

</div>


<div class="garage-column">

<h3>Alt</h3>

<div id="garageAlt"></div>

</div>

</div>


<div class="upload-box">

<h3>Eintrag hinzufügen</h3>

<input type="text" id="titel" placeholder="Titel">

<textarea id="beschreibung" placeholder="Beschreibung"></textarea>

<input type="file" id="bilder" multiple accept="image/*">

<select id="kategorie">
<option value="garageAktuell">Aktuell</option>
<option value="garageAlt">Alt</option>
</select>

<button onclick="addEntry()">Eintrag hinzufügen</button>

</div>

</section>

<script>

function addEntry(){

const titel = document.getElementById("titel").value;
const beschreibung = document.getElementById("beschreibung").value;
const bilder = document.getElementById("bilder").files;
const kategorie = document.getElementById("kategorie").value;

const container = document.getElementById(kategorie);

const entry = document.createElement("div");
entry.className = "garage-entry";

let html = "<h4>"+titel+"</h4>";
html += "<p>"+beschreibung+"</p>";

let count = 0;

for(let file of bilder){

if(count >= 10) break;

const reader = new FileReader();

reader.onload = function(e){

const img = document.createElement("img");
img.src = e.target.result;

entry.appendChild(img);

}

reader.readAsDataURL(file);

count++;

}

entry.innerHTML = html;

container.appendChild(entry);

}



function checkPassword(){

const password = document.getElementById("passwordInput").value;

const correctPassword = "astra"; // HIER Passwort ändern

if(password === correctPassword){

document.getElementById("passwordOverlay").style.display = "none";

}else{

document.getElementById("error").innerText = "Falsches Passwort";

}

}

</script>

</body>
