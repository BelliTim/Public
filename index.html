<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meine Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Styles.css">
</head>

<body>

<nav>
    <div><a href="#fussball">Fussball</a></div>
    <div><a href="#home">Home</a></div>
    <div><a href="#garage">Garage</a></div>
</nav>

<section class="hero" id="home">
    <h1>Willkommen</h1>
    <p class="hero-text">
        Hier gibt es einen kleinen Einblick in mein Leben,<br>
        alles was mich interessiert & ich teilen will.
    </p>
</section>

<!-- ⚽ FUSSBALL -->
<section id="fussball" style="padding:50px; text-align:center;">
    <h2>Fußball</h2>

    <h3>Trikots</h3>
    <div class="grid" id="trikots-container"></div>

    <h3 style="margin-top:40px;">Spiele</h3>
    <div class="cards" id="spiele-container"></div>
</section>

<!-- 🚗 GARAGE -->
<section class="section" id="garage">
    <h2>Garage</h2>

    <div class="garage-container">
        <div class="garage-column">
            <h3>Aktuell</h3>
            <div id="garageAktuell"></div>
        </div>

        <div class="garage-column">
            <h3>Alt</h3>
            <div id="garageAlt"></div>
        </div>
    </div>
</section>

<footer style="font-size:11px;text-align:center;margin-top:40px;color:#777;">
    <a href="rechtliches.html" style="color:#777;text-decoration:none;">
        Rechtliches/Datenschutz/Impressum
    </a>
</footer>

<script>
// =========================
// Hilfsfunktion für altes + neues Format
// =========================
function getImageList(item) {
    if (Array.isArray(item.images)) return item.images;
    if (item.image) return [item.image];
    return [];
}

// =========================
// ⚽ TRIKOTS LADEN
// =========================
async function loadTrikots() {
    try {
        const res = await fetch('/content/trikots.json');
        const data = await res.json();

        const container = document.getElementById("trikots-container");

        container.innerHTML = data.map(item => {
            const imageList = getImageList(item);
            const firstImage = imageList[0] || "";

            return `
                <img src="${firstImage}" alt="${item.title || ""}">
            `;
        }).join("");

    } catch {
        console.log("Fehler bei Trikots");
    }
}

// =========================
// ⚽ SPIELE LADEN
// =========================
async function loadSpiele() {
    try {
        const res = await fetch('/content/spiele.json');
        const data = await res.json();

        const container = document.getElementById("spiele-container");

        container.innerHTML = data.map(item => {
            const imageList = getImageList(item);

            return `
                <div class="card">
                    <div class="card-slider">
                        ${imageList.map((img, index) => `
                            <img src="${img}" class="${index === 0 ? 'active' : ''}" alt="${item.title || ""}">
                        `).join("")}

                        ${imageList.length > 1 ? `
                            <button class="prev">❮</button>
                            <button class="next">❯</button>
                        ` : ""}
                    </div>

                    <h3>${item.title || ""}</h3>
                    <p>${item.comment || item.description || ""}</p>
                </div>
            `;
        }).join("");

        initCardSliders();

    } catch {
        console.log("Fehler bei Spiele");
    }
}

// =========================
// 🚗 GARAGE LADEN
// =========================
async function loadGarage(type, containerId) {
    try {
        const res = await fetch(`/content/${type}.json`);
        const data = await res.json();

        const container = document.getElementById(containerId);

        container.innerHTML = data.map((item, i) => {
            const imageList = getImageList(item);

            return `
                <div class="garage-entry">
                    <h4>${item.title || ""}</h4>
                    <p>${item.comment || item.description || ""}</p>

                    <div class="card-slider garage-slider">
                        ${imageList.map((img, index) => `
                            <img src="${img}" class="${index === 0 ? 'active' : ''}">
                        `).join("")}

                        ${imageList.length > 1 ? `
                            <button class="prev">❮</button>
                            <button class="next">❯</button>
                        ` : ""}
                    </div>
                </div>
            `;
        }).join("");

        initCardSliders();

    } catch {
        console.log("Fehler bei", type);
    }
}

// =========================
// 🎞️ SLIDER für SPIELE
// =========================
function initCardSliders() {
    document.querySelectorAll(".card-slider").forEach(slider => {
        let slides = slider.querySelectorAll("img");
        let index = 0;

        const next = slider.querySelector(".next");
        const prev = slider.querySelector(".prev");

        function show(i) {
            slides.forEach(s => s.classList.remove("active"));
            slides[i].classList.add("active");
        }

        if (next) {
            next.onclick = () => {
                index = (index + 1) % slides.length;
                show(index);
            };
        }

        if (prev) {
            prev.onclick = () => {
                index = (index - 1 + slides.length) % slides.length;
                show(index);
            };
        }
    });
}

// =========================
// 🚀 START
// =========================
loadTrikots();
loadSpiele();
loadGarage("garageAktuell", "garageAktuell");
loadGarage("garageAlt", "garageAlt");
</script>

</body>
</html>
