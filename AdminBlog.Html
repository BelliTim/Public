<!-- BLOG ADMIN TOOL START -->
<section class="admin-block">
  <button type="button" class="collapse-btn" onclick="toggleBlogAdminPanel()">
    Blog-Beiträge verwalten
  </button>

  <div id="blogAdminPanel" class="collapse-content" style="display:none;">

    <h2 style="margin-top:20px;">Neuen Blog-Beitrag hinzufügen</h2>

    <input type="text" id="blogPostTitleInput" placeholder="Titel eingeben">

    <input type="text" id="blogPostDateInput" placeholder="Datum / Zeitspanne eingeben (z. B. April 2026 oder 21.04.2026 - 28.04.2026)">

    <textarea id="blogPostCommentInput" placeholder="Kommentar / Text eingeben" rows="6"></textarea>

    <input type="file" id="blogPostImagesInput" accept="image/*" multiple>

    <button type="button" onclick="addBlogPostEntry()">Blog-Beitrag hinzufügen</button>

    <h2 style="margin-top:30px;">Blog-Beiträge bearbeiten</h2>
    <div id="blogPostAdminList"></div>

    <h2 style="margin-top:30px;">Code für blog.html</h2>
    <textarea id="blogPostOutputCode" rows="18" readonly placeholder="Hier erscheint automatisch der Blog-Code..."></textarea>
  </div>
</section>

<style>
  .admin-block{
    background:#0f172a;
    border:1px solid rgba(96,165,250,0.15);
    border-radius:16px;
    padding:18px;
    margin:20px 0;
  }

  .collapse-btn{
    width:100%;
    background:linear-gradient(135deg,#1d4ed8,#60a5fa);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
  }

  .collapse-content{
    margin-top:18px;
  }

  .blog-post-admin-card{
    background:#111827;
    border:1px solid rgba(96,165,250,0.15);
    border-radius:14px;
    padding:14px;
    margin-top:14px;
  }

  .blog-post-admin-card h3{
    margin-bottom:8px;
    color:#fff;
  }

  .blog-post-admin-card p{
    color:#cbd5e1;
    margin:4px 0;
    white-space:pre-wrap;
  }

  .blog-post-admin-preview-images{
    display:flex;
    gap:8px;
    overflow-x:auto;
    margin:10px 0;
    padding-bottom:4px;
  }

  .blog-post-admin-preview-images img{
    width:85px;
    height:85px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.12);
    flex:0 0 auto;
  }

  .blog-post-admin-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }

  .blog-post-admin-actions button{
    flex:1;
    min-width:120px;
  }

  .blog-post-edit-box{
    display:none;
    margin-top:12px;
    padding:12px;
    border-radius:12px;
    background:#0b1220;
    border:1px solid rgba(96,165,250,0.12);
  }

  .blog-post-edit-box.active{
    display:block;
  }
</style>

<script>
  let blogPostEntries = [];
  let blogPostEditIndex = -1;

  function toggleBlogAdminPanel(){
    const panel = document.getElementById("blogAdminPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
  }

  function escapeBlogHtml(text){
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function resizeBlogImageFile(file, maxWidth = 1400, quality = 0.82){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = function(e){
        const img = new Image();

        img.onload = function(){
          let width = img.width;
          let height = img.height;

          if(width > maxWidth){
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
          }

          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);

          const dataUrl = canvas.toDataURL("image/jpeg", quality);
          resolve(dataUrl);
        };

        img.onerror = reject;
        img.src = e.target.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function getBlogResizedImages(files){
    const fileArray = Array.from(files).slice(0, 10);
    const resizedImages = [];

    for(const file of fileArray){
      const resized = await resizeBlogImageFile(file);
      resizedImages.push(resized);
    }

    return resizedImages;
  }

  async function addBlogPostEntry(){
    const title = document.getElementById("blogPostTitleInput").value.trim();
    const date = document.getElementById("blogPostDateInput").value.trim();
    const comment = document.getElementById("blogPostCommentInput").value.trim();
    const imageFiles = document.getElementById("blogPostImagesInput").files;

    if(!title || !date || !comment){
      alert("Bitte Titel, Datum/Zeitspanne und Kommentar ausfüllen.");
      return;
    }

    let images = [];
    if(imageFiles.length > 0){
      images = await getBlogResizedImages(imageFiles);
    }

    blogPostEntries.unshift({
      id: "blog_" + Date.now(),
      title,
      date,
      comment,
      images
    });

    clearBlogPostForm();
    renderBlogPostAdminList();
    generateBlogPostOutputCode();
  }

  function clearBlogPostForm(){
    document.getElementById("blogPostTitleInput").value = "";
    document.getElementById("blogPostDateInput").value = "";
    document.getElementById("blogPostCommentInput").value = "";
    document.getElementById("blogPostImagesInput").value = "";
  }

  function renderBlogPostAdminList(){
    const list = document.getElementById("blogPostAdminList");
    list.innerHTML = "";

    blogPostEntries.forEach((entry, index) => {
      const imagePreviewHtml = entry.images.length
        ? `<div class="blog-post-admin-preview-images">
            ${entry.images.map(src => `<img src="${src}" alt="Blog Bild">`).join("")}
           </div>`
        : `<p>Keine Bilder</p>`;

      const item = document.createElement("div");
      item.className = "blog-post-admin-card";

      item.innerHTML = `
        <h3>${escapeBlogHtml(entry.title)}</h3>
        <p><strong>Datum/Zeitspanne:</strong> ${escapeBlogHtml(entry.date)}</p>
        <p><strong>Kommentar:</strong><br>${escapeBlogHtml(entry.comment)}</p>

        ${imagePreviewHtml}

        <div class="blog-post-admin-actions">
          <button type="button" onclick="toggleBlogPostEditBox(${index})">Bearbeiten</button>
          <button type="button" onclick="deleteBlogPostEntry(${index})">Löschen</button>
        </div>

        <div class="blog-post-edit-box" id="blogPostEditBox_${index}">
          <input type="text" id="blogPostEditTitle_${index}" value="${escapeBlogHtml(entry.title)}" placeholder="Titel">
          <input type="text" id="blogPostEditDate_${index}" value="${escapeBlogHtml(entry.date)}" placeholder="Datum / Zeitspanne">
          <textarea id="blogPostEditComment_${index}" rows="6" placeholder="Kommentar">${escapeBlogHtml(entry.comment)}</textarea>
          <input type="file" id="blogPostEditImages_${index}" accept="image/*" multiple>

          <div class="blog-post-admin-actions">
            <button type="button" onclick="saveBlogPostEdit(${index})">Speichern</button>
            <button type="button" onclick="toggleBlogPostEditBox(${index})">Schließen</button>
          </div>
        </div>
      `;

      list.appendChild(item);
    });
  }

  function toggleBlogPostEditBox(index){
    const box = document.getElementById("blogPostEditBox_" + index);
    if(box){
      box.classList.toggle("active");
    }
  }

  async function saveBlogPostEdit(index){
    const title = document.getElementById("blogPostEditTitle_" + index).value.trim();
    const date = document.getElementById("blogPostEditDate_" + index).value.trim();
    const comment = document.getElementById("blogPostEditComment_" + index).value.trim();
    const newFiles = document.getElementById("blogPostEditImages_" + index).files;

    if(!title || !date || !comment){
      alert("Bitte Titel, Datum/Zeitspanne und Kommentar ausfüllen.");
      return;
    }

    let images = blogPostEntries[index].images;

    if(newFiles.length > 0){
      images = await getBlogResizedImages(newFiles);
    }

    blogPostEntries[index] = {
      ...blogPostEntries[index],
      title,
      date,
      comment,
      images
    };

    renderBlogPostAdminList();
    generateBlogPostOutputCode();
  }

  function deleteBlogPostEntry(index){
    if(!confirm("Diesen Blog-Beitrag wirklich löschen?")) return;

    blogPostEntries.splice(index, 1);
    renderBlogPostAdminList();
    generateBlogPostOutputCode();
  }

  function generateBlogPostOutputCode(){
    const output = document.getElementById("blogPostOutputCode");

    if(blogPostEntries.length === 0){
      output.value = `<section class="blog-grid" id="blogGrid">
  <!-- HIER kommen später automatisch neue Blog Beiträge rein -->
</section>`;
      return;
    }

    const html = blogPostEntries.map((entry, index) => {
      const sliderId = `blogSlider_${index}`;

      const slides = entry.images.length
        ? entry.images.map((img, imgIndex) => `
          <div class="blog-slide ${imgIndex === 0 ? "active" : ""}">
            <img src="${img}" alt="${escapeBlogHtml(entry.title)} Bild ${imgIndex + 1}">
          </div>
        `).join("")
        : `
          <div class="blog-slide active">
            <div class="blog-no-image">Kein Bild</div>
          </div>
        `;

      const arrows = entry.images.length > 1
        ? `
          <button class="blog-slider-btn prev" onclick="moveBlogSlider('${sliderId}', -1)">‹</button>
          <button class="blog-slider-btn next" onclick="moveBlogSlider('${sliderId}', 1)">›</button>
        `
        : "";

      return `
<article class="blog-card">
  <div class="blog-slider" id="${sliderId}">
    ${slides}
    ${arrows}
  </div>

  <div class="blog-content">
    <div class="blog-date">${escapeBlogHtml(entry.date)}</div>
    <h3 class="blog-title">${escapeBlogHtml(entry.title)}</h3>
    <p class="blog-text">${escapeBlogHtml(entry.comment).replace(/\n/g, "<br>")}</p>
  </div>
</article>`;
    }).join("\n\n");

    output.value = html;
  }
</script>
<!-- BLOG ADMIN TOOL END -->
