<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meine Website</title>

<link rel="stylesheet" href="/docs/Styles.css">
</head>

<body>

<nav>
    <div><a href="#fussball">Fussball</a></div>
    <div><a href="#home">Home</a></div>
    <div><a href="#garage">Garage</a></div>
</nav>

<section class="hero" id="home">
    <h1>Willkommen</h1>
    <p class="hero-text">
        Hier gibt es einen kleinen Einblick in mein Leben,<br>
        alles was mich interessiert & ich teilen will.
    </p>
</section>

<!-- ⚽ FUSSBALL -->
<section id="fussball" style="padding:50px; text-align:center;">
    <h2>Fußball</h2>

    <h3>Trikots</h3>
    <div class="grid" id="trikots-container"></div>

    <h3 style="margin-top:40px;">Spiele</h3>
    <div class="cards" id="spiele-container"></div>
</section>

<!-- 🚗 GARAGE -->
<section class="section" id="garage">
    <h2>Garage</h2>

    <div class="garage-container">
        <div class="garage-column">
            <h3>Aktuell</h3>
            <div id="garageAktuell"></div>
        </div>

        <div class="garage-column">
            <h3>Alt</h3>
            <div id="garageAlt"></div>
        </div>
    </div>
</section>

<footer style="font-size:11px;text-align:center;margin-top:40px;color:#777;">
    <a href="rechtliches.html" style="color:#777;text-decoration:none;">
        Rechtliches/Datenschutz/Impressum
    </a>
</footer>

<footer style="font-size:11px;text-align:center;margin-top:40px;color:#777;">
    <a href="/blog" style="color:#777;text-decoration:none;">
        Blog
    </a>
</footer>    

<div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
        <button class="lightbox-close" type="button" onclick="closeLightbox()">✕</button>
        <button class="lightbox-btn prev" type="button" onclick="moveLightbox(-1)">❮</button>
        <button class="lightbox-btn next" type="button" onclick="moveLightbox(1)">❯</button>
        <div class="lightbox-track" id="lightboxTrack"></div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>
</div>
    
<script>
// =========================
// Hilfsfunktion für altes + neues Format
// =========================
function getImageList(item) {
    if (Array.isArray(item.images)) return item.images;
    if (item.image) return [item.image];
    return [];
}

let lightboxImages = [];
let lightboxIndex = 0;
let touchStartX = 0;
let touchEndX = 0;

function openLightbox(images, startIndex = 0) {
    if (!Array.isArray(images) || !images.length) return;

    lightboxImages = images;
    lightboxIndex = startIndex;

    const track = document.getElementById("lightboxTrack");
    const counter = document.getElementById("lightboxCounter");
    const lightbox = document.getElementById("lightbox");

    track.innerHTML = images.map((img, i) => `
        <img src="${img}" class="${i === startIndex ? "active" : ""}" alt="Großansicht ${i + 1}">
    `).join("");

    counter.textContent = `${startIndex + 1} / ${images.length}`;
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";

    track.addEventListener("touchstart", handleTouchStart, { passive: true });
    track.addEventListener("touchend", handleTouchEnd, { passive: true });
}

function closeLightbox() {
    const lightbox = document.getElementById("lightbox");
    const track = document.getElementById("lightboxTrack");

    lightbox.classList.remove("open");
    document.body.style.overflow = "";

    track.removeEventListener("touchstart", handleTouchStart);
    track.removeEventListener("touchend", handleTouchEnd);
}

function moveLightbox(direction) {
    if (!lightboxImages.length) return;

    const slides = document.querySelectorAll("#lightboxTrack img");
    if (!slides.length) return;

    slides[lightboxIndex].classList.remove("active");

    lightboxIndex += direction;
    if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
    if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;

    slides[lightboxIndex].classList.add("active");
    document.getElementById("lightboxCounter").textContent = `${lightboxIndex + 1} / ${lightboxImages.length}`;
}

function handleTouchStart(e) {
    touchStartX = e.changedTouches[0].screenX;
}

function handleTouchEnd(e) {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchEndX - touchStartX;

    if (Math.abs(diff) < 40) return;

    if (diff < 0) moveLightbox(1);
    else moveLightbox(-1);
}

// =========================
// ⚽ TRIKOTS LADEN
// =========================
async function loadTrikots() {
    try {
        const res = await fetch('/content/trikots.json');
        const data = await res.json();

        const container = document.getElementById("trikots-container");

        container.innerHTML = data.map(item => {
            const imageList = getImageList(item);
            const firstImage = imageList[0] || "";
            const season = item.title || "";
            const type = item.comment || item.description || "";

            return `
                <div class="trikot-card">
                    <div class="trikot-season">${season}</div>
                    <div class="trikot-type">${type}</div>

<button class="trikot-image-wrap" type="button" onclick='openLightbox("${firstImage}")'>
                        <img src="${firstImage}" alt="${season}">
                    </button>
                </div>
            `;
        }).join("");
        
        collapseTrikots();

    } catch {
        console.log("Fehler bei Trikots");
    }
}

function collapseTrikots() {
    const cards = document.querySelectorAll("#trikots-container .trikot-card");
    const visibleCount = 3;

    if (cards.length <= visibleCount) return;

    cards.forEach((card, index) => {
        if (index >= visibleCount) {
            card.classList.add("trikot-hidden");
        }
    });

    const button = document.createElement("button");
    button.textContent = "Weitere Trikots anzeigen";
    button.className = "show-more-trikots";

    button.onclick = () => {
        const hiddenCards = document.querySelectorAll(".trikot-hidden");
        const isClosed = hiddenCards[0]?.style.display !== "block";

        hiddenCards.forEach(card => {
            card.style.display = isClosed ? "block" : "none";
        });

        button.textContent = isClosed
            ? "Trikots einklappen"
            : "Weitere Trikots anzeigen";
    };

    document.getElementById("trikots-container").after(button);
}

// =========================
// ⚽ SPIELE LADEN
// =========================
async function loadSpiele() {
    try {
        const res = await fetch('/content/spiele.json');
        const data = await res.json();

        const container = document.getElementById("spiele-container");

        container.innerHTML = data.map(item => {
            const imageList = getImageList(item);

            return `
                <div class="card">
                    <div class="card-slider">
                        ${imageList.map((img, index) => `
                            <img src="${img}" class="${index === 0 ? 'active' : ''}" alt="${item.title || ""}">
                        `).join("")}

                        ${imageList.length > 1 ? `
                            <button class="prev">❮</button>
                            <button class="next">❯</button>
                        ` : ""}
                    </div>

                    <h3>${item.title || ""}</h3>
                    <p>${item.comment || item.description || ""}</p>
                </div>
            `;
        }).join("");

        initCardSliders();

    } catch {
        console.log("Fehler bei Spiele");
    }
}

// =========================
// 🚗 GARAGE LADEN
// =========================
async function loadGarage(type, containerId) {
    try {
        const res = await fetch(`/content/${type}.json`);
        const data = await res.json();

        const container = document.getElementById(containerId);

        container.innerHTML = data.map((item, i) => {
            const imageList = getImageList(item);

            return `
                <div class="garage-entry">
                    <h4>${item.title || ""}</h4>
                    <p>${item.comment || item.description || ""}</p>

                    <div class="card-slider garage-slider">
                        ${imageList.map((img, index) => `
                            <img src="${img}" class="${index === 0 ? 'active' : ''}">
                        `).join("")}

                        ${imageList.length > 1 ? `
                            <button class="prev">❮</button>
                            <button class="next">❯</button>
                        ` : ""}
                    </div>
                </div>
            `;
        }).join("");

        initCardSliders();

    } catch {
        console.log("Fehler bei", type);
    }
}

// =========================
// 🎞️ SLIDER für SPIELE
// =========================
function initCardSliders() {
    document.querySelectorAll(".card-slider").forEach(slider => {
        let slides = slider.querySelectorAll("img");
        let index = 0;

        const next = slider.querySelector(".next");
        const prev = slider.querySelector(".prev");

        function show(i) {
            slides.forEach(s => s.classList.remove("active"));
            slides[i].classList.add("active");
        }

        if (next) {
            next.onclick = () => {
                index = (index + 1) % slides.length;
                show(index);
            };
        }

        if (prev) {
            prev.onclick = () => {
                index = (index - 1 + slides.length) % slides.length;
                show(index);
            };
        }
    });
}

// =========================
// 🚀 START
// =========================
loadTrikots();
loadSpiele();
loadGarage("garageAktuell", "garageAktuell");
loadGarage("garageAlt", "garageAlt");
</script>

</body>
</html>
