<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Deine Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top left, rgba(37,99,235,0.18), transparent 30%),
    radial-gradient(circle at top right, rgba(96,165,250,0.12), transparent 25%),
    linear-gradient(180deg,#071224 0%,#0f172a 45%,#111c33 100%);
    color:white;
    min-height:100vh;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    width:100%;
    z-index:999;
    background:#071224;
    border-bottom:1px solid rgba(96,165,250,0.12);
}

.nav-inner{
    max-width:1200px;
    margin:auto;
    padding:18px 20px;
    display:flex;
    justify-content:center;
}

.nav-links a{
    color:#cbd5e1;
    text-decoration:none;
    font-size:18px;
}

/* MAIN */
.page-wrap{
    max-width:1200px;
    margin:auto;
    padding:30px 20px 60px;
}

/* HEADLINE */
.section-head{
    text-align:center;
    margin-bottom:42px;
    padding:18px 10px 8px;
}

.section-badge{
    display:inline-block;
    padding:7px 14px;
    border-radius:999px;
    background:rgba(37,99,235,0.12);
    border:1px solid rgba(96,165,250,0.14);
    color:#93c5fd;
    font-size:0.88rem;
    font-weight:600;
    margin-bottom:16px;
    letter-spacing:0.3px;
}

.section-head h1{
    font-size:clamp(2.2rem, 7vw, 4rem);
    line-height:1.05;
    margin-bottom:14px;
    color:#ffffff;
    text-shadow:0 8px 30px rgba(0,0,0,0.2);
}

.section-head p{
    color:#cbd5e1;
    font-size:1.08rem;
    line-height:1.6;
    max-width:680px;
    margin:0 auto;
}

/* BLOG GRID */
.blog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}

.blog-card{
    background:
        radial-gradient(circle at top right, rgba(96,165,250,0.10), transparent 28%),
        linear-gradient(180deg, rgba(18,28,52,0.98), rgba(6,14,30,0.98));
    border:1px solid rgba(96,165,250,0.16);
    border-radius:26px;
    overflow:hidden;
    box-shadow:
        0 20px 50px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.03);
    transition:transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    position:relative;
}

.blog-card:hover{
    transform:translateY(-6px);
    border-color:rgba(96,165,250,0.28);
    box-shadow:
        0 28px 65px rgba(0,0,0,0.34),
        0 0 30px rgba(37,99,235,0.08);
}

.blog-slider{
    position:relative;
    width:100%;
    height:260px;
    overflow:hidden;
    background:
        radial-gradient(circle at top right, rgba(96,165,250,0.15), transparent 30%),
        linear-gradient(135deg,#10265f 0%,#1d4ed8 55%,#60a5fa 100%);
}

.blog-slider img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.blog-slider img.active{
    display:block;
}

.blog-slider::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:90px;
    background:linear-gradient(to top, rgba(2,6,23,0.28), transparent);
    pointer-events:none;
}

.blog-slider button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:rgba(2,6,23,0.62);
    color:#fff;
    cursor:pointer;
    z-index:2;
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.12);
    transition:0.2s ease;
    padding:0;
}

.blog-slider button:hover{
    background:rgba(30,58,138,0.82);
    transform:translateY(-50%) scale(1.06);
}

.blog-slider .prev{ left:12px; }
.blog-slider .next{ right:12px; }

.blog-content{
    padding:22px 20px 24px;
}

.blog-date{
    display:inline-block;
    margin-bottom:14px;
    padding:6px 11px;
    border-radius:999px;
    background:rgba(37,99,235,0.12);
    border:1px solid rgba(96,165,250,0.12);
    color:#93c5fd;
    font-size:0.9rem;
    font-weight:600;
}

.blog-title{
    color:#fff;
    font-size:1.55rem;
    line-height:1.2;
    margin-bottom:12px;
}

.blog-text{
    color:#cbd5e1;
    line-height:1.75;
    font-size:1rem;
    white-space:pre-line;
}
/* FOOTER */
footer{
    font-size:11px;
    text-align:center;
    margin-top:50px;
    padding-bottom:25px;
    color:#777;
}

footer a{
    color:#777;
    text-decoration:none;
}

/* MOBILE */
@media(max-width:700px){

.section-head h2{
    font-size:34px;
}

.section-head span{
    font-size:17px;
}

.nav-links a{
    font-size:17px;
}

}
</style>
</head>

<body>

<header class="navbar">
    <div class="nav-inner">
        <nav class="nav-links">
            <a href="index.html">Home</a>
        </nav>
    </div>
</header>

<main class="page-wrap">

 <div class="section-head">

<p>Reisen, Eindrücke und besondere Momente.</p>

<h1>↓ Neuester Beitrag ↓</h1>

</div>

    <section class="blog-grid" id="blogGrid">
        <!-- HIER kommen später automatisch neue Blog Beiträge rein -->
    </section>

</main>

<footer>
    <a href="rechtliches.html">
        Rechtliches/Datenschutz/Impressum
    </a>
</footer>
<script>
function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function initBlogSlider(container) {
    let index = 0;
    const slides = container.querySelectorAll("img");
    const prevBtn = container.querySelector(".prev");
    const nextBtn = container.querySelector(".next");

    if (!slides.length) return;

    function show(i) {
        slides.forEach(img => img.classList.remove("active"));
        slides[i].classList.add("active");
    }

    if (slides.length <= 1) {
        if (prevBtn) prevBtn.style.display = "none";
        if (nextBtn) nextBtn.style.display = "none";
        show(0);
        return;
    }

    show(0);

    prevBtn.onclick = () => {
        index = (index - 1 + slides.length) % slides.length;
        show(index);
    };

    nextBtn.onclick = () => {
        index = (index + 1) % slides.length;
        show(index);
    };
}

async function loadBlogPosts() {
    const grid = document.getElementById("blogGrid");

    try {
        const res = await fetch("/content/blog.json");

        if (!res.ok) {
            grid.innerHTML = "";
            return;
        }

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
            grid.innerHTML = "";
            return;
        }

        grid.innerHTML = data.map((item, i) => {
            const title = escapeHtml(item.title || "");
            const dateRange = escapeHtml(item.dateRange || item.date || "");
            const comment = escapeHtml(item.comment || "");
            const images = Array.isArray(item.images) ? item.images : [];

            return `
                <article class="blog-card">
                    <div class="blog-slider" id="blog-slider-${i}">
                        ${
                            images.length
                                ? images.map((img, j) => `
                                    <img src="${img}" class="${j === 0 ? "active" : ""}" alt="${title}">
                                `).join("")
                                : `<img src="data:image/svg+xml;utf8,
                                    <svg xmlns='http://www.w3.org/2000/svg' width='1200' height='600'>
                                      <rect width='100%' height='100%' fill='%230b1220'/>
                                      <text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='34'>Kein Bild</text>
                                    </svg>" class="active" alt="Kein Bild">`
                        }
                        <button class="prev" type="button">❮</button>
                        <button class="next" type="button">❯</button>
                    </div>

                    <div class="blog-content">
                        <div class="blog-date">${dateRange}</div>
                        <h3 class="blog-title">${title}</h3>
                        <div class="blog-text">${comment}</div>
                    </div>
                </article>
            `;
        }).join("");

        document.querySelectorAll(".blog-slider").forEach(initBlogSlider);

    } catch (e) {
        console.error("Blog konnte nicht geladen werden:", e);
        grid.innerHTML = "";
    }
}

loadBlogPosts();
</script>
</body>
</html>
