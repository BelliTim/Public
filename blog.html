<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Deine Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top left, rgba(37,99,235,0.18), transparent 30%),
    radial-gradient(circle at top right, rgba(96,165,250,0.12), transparent 25%),
    linear-gradient(180deg,#071224 0%,#0f172a 45%,#111c33 100%);
    color:white;
    min-height:100vh;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    width:100%;
    z-index:999;
    background:#071224;
    border-bottom:1px solid rgba(96,165,250,0.12);
}

.nav-inner{
    max-width:1200px;
    margin:auto;
    padding:18px 20px;
    display:flex;
    justify-content:center;
}

.nav-links a{
    color:#cbd5e1;
    text-decoration:none;
    font-size:18px;
}

/* MAIN */
.page-wrap{
    max-width:1200px;
    margin:auto;
    padding:30px 20px 60px;
}

/* HEADLINE */
.section-head{
    text-align:center;
    margin-bottom:35px;
}

.section-head h2{
    font-size:42px;
    margin-bottom:10px;
}

.section-head span{
    color:#cbd5e1;
    font-size:18px;
}

/* BLOG GRID */
.blog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

/* LEER GELASSEN - später durch Upload befüllt */
.blog-card{
    background: linear-gradient(180deg, rgba(15,23,42,0.96), rgba(2,6,23,0.96));
    border: 1px solid rgba(96,165,250,0.14);
    border-radius: 18px;
    overflow: hidden;
}

.blog-slider{
    position: relative;
    width: 100%;
    height: 240px;
    overflow: hidden;
    background: #0b1220;
}

.blog-slider img{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.blog-slider img.active{
    display: block;
}

.blog-slider button{
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    border-radius: 10px;
    width: auto;
    padding: 8px 12px;
    cursor: pointer;
}

.blog-slider .prev{ left: 8px; }
.blog-slider .next{ right: 8px; }

.blog-content{
    padding: 18px;
}

.blog-date{
    color: #93c5fd;
    font-size: 14px;
    margin-bottom: 10px;
}

.blog-title{
    font-size: 24px;
    margin-bottom: 12px;
}

.blog-text{
    color: #cbd5e1;
    line-height: 1.7;
    white-space: pre-line;
}

/* FOOTER */
footer{
    font-size:11px;
    text-align:center;
    margin-top:50px;
    padding-bottom:25px;
    color:#777;
}

footer a{
    color:#777;
    text-decoration:none;
}

/* MOBILE */
@media(max-width:700px){

.section-head h2{
    font-size:34px;
}

.section-head span{
    font-size:17px;
}

.nav-links a{
    font-size:17px;
}

}
</style>
</head>

<body>

<header class="navbar">
    <div class="nav-inner">
        <nav class="nav-links">
            <a href="index.html">Home</a>
        </nav>
    </div>
</header>

<main class="page-wrap">

    <div class="section-head">
        <h2>Neueste Beiträge</h2>
        <span>Beiträge folgen bald</span>
    </div>

    <section class="blog-grid" id="blogGrid">
        <!-- HIER kommen später automatisch neue Blog Beiträge rein -->
    </section>

</main>

<footer>
    <a href="rechtliches.html">
        Rechtliches/Datenschutz/Impressum
    </a>
</footer>
<script>
function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function initBlogSlider(container) {
    let index = 0;
    const slides = container.querySelectorAll("img");
    const prevBtn = container.querySelector(".prev");
    const nextBtn = container.querySelector(".next");

    if (!slides.length) return;

    function show(i) {
        slides.forEach(img => img.classList.remove("active"));
        slides[i].classList.add("active");
    }

    if (slides.length <= 1) {
        if (prevBtn) prevBtn.style.display = "none";
        if (nextBtn) nextBtn.style.display = "none";
        show(0);
        return;
    }

    show(0);

    prevBtn.onclick = () => {
        index = (index - 1 + slides.length) % slides.length;
        show(index);
    };

    nextBtn.onclick = () => {
        index = (index + 1) % slides.length;
        show(index);
    };
}

async function loadBlogPosts() {
    const grid = document.getElementById("blogGrid");

    try {
        const res = await fetch("/content/blog.json");

        if (!res.ok) {
            grid.innerHTML = "";
            return;
        }

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
            grid.innerHTML = "";
            return;
        }

        grid.innerHTML = data.map((item, i) => {
            const title = escapeHtml(item.title || "");
            const dateRange = escapeHtml(item.dateRange || item.date || "");
            const comment = escapeHtml(item.comment || "");
            const images = Array.isArray(item.images) ? item.images : [];

            return `
                <article class="blog-card">
                    <div class="blog-slider" id="blog-slider-${i}">
                        ${
                            images.length
                                ? images.map((img, j) => `
                                    <img src="${img}" class="${j === 0 ? "active" : ""}" alt="${title}">
                                `).join("")
                                : `<img src="data:image/svg+xml;utf8,
                                    <svg xmlns='http://www.w3.org/2000/svg' width='1200' height='600'>
                                      <rect width='100%' height='100%' fill='%230b1220'/>
                                      <text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='34'>Kein Bild</text>
                                    </svg>" class="active" alt="Kein Bild">`
                        }
                        <button class="prev" type="button">❮</button>
                        <button class="next" type="button">❯</button>
                    </div>

                    <div class="blog-content">
                        <div class="blog-date">${dateRange}</div>
                        <h3 class="blog-title">${title}</h3>
                        <div class="blog-text">${comment}</div>
                    </div>
                </article>
            `;
        }).join("");

        document.querySelectorAll(".blog-slider").forEach(initBlogSlider);

    } catch (e) {
        console.error("Blog konnte nicht geladen werden:", e);
        grid.innerHTML = "";
    }
}

loadBlogPosts();
</script>
</body>
</html>
