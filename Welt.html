<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weltkarte</title>

<style>
body {
    margin: 0;
    background: #0b1c2c;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
}

h1 {
    margin-top: 20px;
    font-size: 28px;
}

/* Map Container */
#map-container {
    width: 100%;
    height: 85vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* SVG Styling */
svg {
    width: 95%;
    height: auto;
}

/* Länder */
path {
    fill: #122b44;
    stroke: #2e5c88;
    stroke-width: 0.5;
    transition: all 0.2s ease;
    cursor: pointer;
}

/* Hover */
path:hover {
    fill: #3a7bd5;
}

/* Besuchte Länder */
.visited {
    fill: #4fa3ff;
}

/* Footer */
footer {
    width: 100%;
    padding: 15px 0;
    background: #081520;
    position: fixed;
    bottom: 0;
    left: 0;
    font-size: 14px;
    border-top: 1px solid #1f3a5a;
}

footer a {
    color: #4fa3ff;
    text-decoration: none;
    margin: 0 10px;
}

footer a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<h1>Welt</h1>

<div id="map-container"></div>

<footer>
    <a href="rechtliches.html">Rechtliches</a> /
    <a href="rechtliches.html">Datenschutz</a> /
    <a href="rechtliches.html">Impressum</a>
</footer>

<script>
// SVG laden
fetch("Welt.svg")
.then(res => res.text())
.then(data => {
    document.getElementById("map-container").innerHTML = data;

    const countries = document.querySelectorAll("path");

    countries.forEach(country => {
        country.addEventListener("click", () => {
            alert("Land: " + country.id);
        });
    });

    // 👉 HIER DEINE LÄNDER EINTRAGEN
    const visited = ["DEU", "USA", "CHN"]; // Beispiel

    visited.forEach(code => {
        const el = document.getElementById(code);
        if (el) el.classList.add("visited");
    });
});
</script>

</body>
</html>
