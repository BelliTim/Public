<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Welt</title>

<style>
body{
  margin:0;
  background:#0b0f19;
  color:white;
  text-align:center;
}

svg{
  width:100%;
  max-width:1200px;
}

path{
  fill:#1f2937;
  stroke:#1e3a5f;
  transition:0.2s;
}

path:hover{
  fill:#3b82f6;
}
</style>
</head>

<body>

<h1>Welt</h1>

<svg id="map"></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>

<script>
d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
.then(function(data){

  const svg = d3.select("#map");
  const projection = d3.geoNaturalEarth1().scale(180).translate([500,250]);
  const path = d3.geoPath().projection(projection);

  svg.selectAll("path")
    .data(data.features)
    .enter()
    .append("path")
    .attr("d", path)
    .attr("id", d => d.id)
});
</script>

</body>
</html>
