<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Welt</title>

<style>

body{
  background:#0b0f19;
  margin:0;
  font-family: system-ui;
  color:white;
  text-align:center;
}

h1{
  margin:20px;
}

/* MAP */
svg{
  width:100%;
  max-width:1100px;
}

/* Standard Länder */
.land{
  fill:#1f2937;
  stroke:#0b0f19;
  stroke-width:1;
}

/* Deine Länder */
.active{
  cursor:pointer;
  transition:0.2s;
}

.active:hover{
  transform:scale(1.03);
  filter:brightness(1.2);
}

/* Tooltip */
#tooltip{
  position:absolute;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
  pointer-events:none;
  font-size:14px;
}

</style>
</head>

<body>

<h1>Welt</h1>

<div id="tooltip"></div>

<svg viewBox="0 0 1000 500">

<!-- GANZE WELT (vereinfacht Kontinente) -->

<!-- Amerika -->
<path class="land" d="M100,200 L250,200 L280,350 L150,370 Z"/>

<!-- Europa -->
<path class="land" d="M450,200 L600,220 L580,300 L460,290 Z"/>

<!-- Afrika -->
<path class="land" d="M500,300 L580,300 L560,420 L480,400 Z"/>

<!-- Asien -->
<path class="land" d="M650,200 L900,250 L880,380 L700,350 Z"/>

<!-- DEINE LÄNDER -->

<!-- USA -->
<path class="active" fill="url(#us)"
d="M120,260 L260,250 L280,320 L150,330 Z"
onmousemove="show(event,'USA','https://flagcdn.com/w40/us.png')"
onmouseleave="hide()"/>

<!-- Frankreich -->
<circle class="active" cx="500" cy="260" r="12"
fill="url(#fr)"
onmousemove="show(event,'Frankreich','https://flagcdn.com/w40/fr.png')"
onmouseleave="hide()"/>

<!-- Spanien -->
<circle class="active" cx="480" cy="290" r="10"
fill="url(#es)"
onmousemove="show(event,'Spanien','https://flagcdn.com/w40/es.png')"
onmouseleave="hide()"/>

<!-- Italien -->
<circle class="active" cx="540" cy="290" r="10"
fill="url(#it)"
onmousemove="show(event,'Italien','https://flagcdn.com/w40/it.png')"
onmouseleave="hide()"/>

<!-- China -->
<path class="active" fill="url(#cn)"
d="M720,260 L840,260 L820,320 L740,320 Z"
onmousemove="show(event,'China','https://flagcdn.com/w40/cn.png')"
onmouseleave="hide()"/>

</svg>

<!-- FLAGGEN -->
<svg width="0" height="0">
<defs>
<pattern id="us" patternUnits="objectBoundingBox" width="1" height="1">
<image href="https://flagcdn.com/w320/us.png" width="200"/>
</pattern>

<pattern id="fr" patternUnits="objectBoundingBox" width="1" height="1">
<image href="https://flagcdn.com/w320/fr.png"/>
</pattern>

<pattern id="es" patternUnits="objectBoundingBox" width="1" height="1">
<image href="https://flagcdn.com/w320/es.png"/>
</pattern>

<pattern id="it" patternUnits="objectBoundingBox" width="1" height="1">
<image href="https://flagcdn.com/w320/it.png"/>
</pattern>

<pattern id="cn" patternUnits="objectBoundingBox" width="1" height="1">
<image href="https://flagcdn.com/w320/cn.png"/>
</pattern>
</defs>
</svg>

<script>

function show(e,name,flag){
  const t = document.getElementById("tooltip");
  t.style.display="block";
  t.style.left = e.pageX+10+"px";
  t.style.top = e.pageY+10+"px";
  t.innerHTML = `<b>${name}</b><br><img src="${flag}" width="40">`;
}

function hide(){
  document.getElementById("tooltip").style.display="none";
}

</script>

</body>
</html>
